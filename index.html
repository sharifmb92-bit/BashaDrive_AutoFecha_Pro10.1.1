<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>BashaDrive Auto-Fecha Pro 10.1.0</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,700,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: system-ui, -apple-system, sans-serif;
            padding-top: env(safe-area-inset-top);
        }
        .card-dia {
            background: linear-gradient(145deg, #111827, #0f172a);
            border-radius: 1.25rem;
            margin-bottom: 0.7rem;
            padding: 0.9rem 1.2rem;
            border-left: 8px solid #374151;
            transition: all 0.2s ease;
        }
        .card-hoy {
            border: 1px solid #f97316 !important;
            border-left-width: 8px !important;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.2);
        }
        .border-expres { border-left-color: #0ea5e9; }  
        .border-escolar { border-left-color: #10b981; } 
        .border-tarde { border-left-color: #f59e0b; }   
        .border-libre { border-left-color: #4b5563; opacity: 0.7; }

        .bus-badge {
            background: #f97316;
            color: #000000;
            padding: 0.25rem 0.6rem;
            border-radius: 0.6rem;
            font-weight: 900;
            font-size: 1.35rem;
            line-height: 1;
        }
        .input-manual {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 0.6rem;
            padding: 0.6rem;
            color: white;
            width: 100%;
            font-size: 1rem;
        }
    </style>
</head>
<body x-data="bashaApp()" x-init="init()">

    <!-- Header Fijo -->
    <header class="p-4 sticky top-0 bg-black/95 backdrop-blur-md z-50 flex flex-col gap-2 border-b border-white/10">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-base font-black text-orange-500 italic leading-none">BASHADRIVE <span class="text-white">PRO</span></h1>
                <p class="text-[9px] font-bold text-sky-400 uppercase tracking-widest">Menorca • V10.1.0 Auto-Fecha Inteligente</p>
            </div>
            <div class="flex gap-2">
                <button @click="borrarTodo()" class="text-red-500 bg-red-500/10 w-9 h-9 rounded-full flex items-center justify-center">
                    <span class="material-symbols-outlined text-xl">delete</span>
                </button>
                <button @click="ui.showImport = true" class="bg-orange-600 w-9 h-9 rounded-full flex items-center justify-center shadow-lg text-white">
                    <span class="material-symbols-outlined text-xl">add</span>
                </button>
            </div>
        </div>
        
        <!-- NAVEGACIÓN DE SEMANAS AUTOMÁTICA -->
        <div class="flex justify-between items-center bg-white/5 rounded-xl px-2 py-1">
            <button @click="navegarSemana(-7)" class="text-sky-400 p-1 active:scale-90 transition">
                <span class="material-symbols-outlined">arrow_back_ios</span>
            </button>
            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Navegar Semanas</span>
            <button @click="navegarSemana(7)" class="text-sky-400 p-1 active:scale-90 transition">
                <span class="material-symbols-outlined">arrow_forward_ios</span>
            </button>
        </div>
    </header>

    <main class="p-3 pb-24">
        <template x-for="(dia, index) in planning" :key="index">
            <div class="card-dia" :class="[getEstiloDia(dia), esHoy(dia.fecha) ? 'card-hoy' : '']">
                
                <div class="flex justify-between items-start mb-1">
                    <div>
                        <!-- 1. DÍA -->
                        <h3 class="text-orange-500 font-black uppercase text-[10px] tracking-widest" x-text="dia.diaSemana"></h3>
                        
                        <!-- 2. FECHA -->
                        <div class="flex items-center gap-2">
                            <p class="text-white font-bold text-sm" x-text="dia.fecha"></p>
                            <template x-if="esHoy(dia.fecha)">
                                <span class="text-[9px] font-black text-sky-400 uppercase tracking-tighter">● Hoy</span>
                            </template>
                        </div>
                    </div>
                    <button @click="abrirEditor(index)" class="text-gray-600 p-1">
                        <span class="material-symbols-outlined text-lg">edit</span>
                    </button>
                </div>

                <div class="flex items-center justify-between gap-3 mt-1">
                    <div class="flex-1">
                        <!-- 3. SERVICIO -->
                        <h2 class="text-[1.1rem] font-black text-white uppercase leading-tight" x-text="dia.servicio"></h2>
                        
                        <div class="flex flex-wrap gap-x-4 gap-y-1 mt-1.5 text-gray-400 font-bold text-sm">
                            <div class="flex items-center gap-1">
                                <span class="material-symbols-outlined text-[14px] text-sky-400">login</span>
                                <span x-text="dia.entrada || '--:--'"></span>
                            </div>
                            <div class="flex items-center gap-1">
                                <span class="material-symbols-outlined text-[14px] text-orange-400">logout</span>
                                <span x-text="dia.salida || '--:--'"></span>
                            </div>
                            <!-- Indicadores de dietas automáticos -->
                            <template x-if="calcularDietas(dia).comida">
                                <span class="text-[10px] bg-emerald-500/10 text-emerald-400 px-1.5 py-0.5 rounded border border-emerald-500/20">🍽️ Dietas Comida</span>
                            </template>
                            <template x-if="calcularDietas(dia).cena">
                                <span class="text-[10px] bg-purple-500/10 text-purple-400 px-1.5 py-0.5 rounded border border-purple-500/20">🌙 Dietas Cena</span>
                            </template>
                        </div>
                    </div>
                    <template x-if="dia.bus">
                        <span class="bus-badge" x-text="dia.bus"></span>
                    </template>
                </div>
            </div>
        </template>
    </main>

    <!-- Modal Pegar Cuadrante -->
    <div x-show="ui.showImport" x-cloak class="fixed inset-0 bg-black z-[100] p-6 flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-black text-orange-500 uppercase">Pegar Cuadrante Real</h2>
            <button @click="ui.showImport = false" class="text-white"><span class="material-symbols-outlined">close</span></button>
        </div>
        <p class="text-xs text-gray-400 mb-2">Pega aquí el bloque de texto completo enviado por la empresa. El extractor inteligente identificará los turnos, horarios y autobuses asignados automáticamente.</p>
        <textarea x-model="inputRaw" class="flex-grow bg-gray-900 border border-white/10 rounded-xl p-4 text-sky-400 font-mono text-sm outline-none" placeholder="Pega el cuadrante recibido aquí..."></textarea>
        <button @click="procesarCuadranteInteligente(inputRaw)" class="mt-4 bg-orange-600 text-white py-4 rounded-xl font-black uppercase text-sm"> Extraer e Importar Semana </button>
    </div>

    <!-- Modal Editar -->
    <div x-show="ui.showEdit" x-cloak class="fixed inset-0 bg-black/95 z-[110] p-6 flex items-center justify-center">
        <div class="bg-gray-900 border border-white/20 rounded-2xl p-5 w-full max-w-sm">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-sm font-black text-orange-500 uppercase" x-text="editForm.diaSemana"></h3>
                <button @click="marcarLibreManual()" class="bg-gray-700 text-[9px] px-3 py-1 rounded-full font-black text-white uppercase">LIBRE</button>
            </div>
            
            <div class="space-y-3">
                <div>
                    <label class="text-[9px] font-bold text-gray-500 uppercase ml-1">Fecha</label>
                    <input type="text" x-model="editForm.fecha" class="input-manual font-bold text-center" placeholder="DD/MM/AA"/>
                </div>
                <div>
                    <label class="text-[9px] font-bold text-gray-500 uppercase ml-1">Turno / Servicio</label>
                    <input type="text" x-model="editForm.servicio" class="input-manual uppercase font-black"/>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[9px] font-bold text-gray-400 ml-1">Entrada</label>
                        <input type="time" x-model="editForm.entrada" class="input-manual text-center"/>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-gray-400 ml-1">Salida</label>
                        <input type="time" x-model="editForm.salida" class="input-manual text-center"/>
                    </div>
                </div>
                <div>
                    <label class="text-[9px] font-bold text-gray-500 uppercase ml-1">Nº Autobús</label>
                    <input type="text" x-model="editForm.bus" class="input-manual text-center font-black text-orange-500 text-xl" placeholder="Bus"/>
                </div>
            </div>

            <!-- Avisos en tiempo real del supervisor -->
            <div class="mt-3 text-[11px] text-red-400 font-bold space-y-1">
                <template x-if="editForm.salida && !editForm.entrada">
                    <p>⚠️ Falta hora de inicio del turno.</p>
                </template>
                <template x-if="editForm.servicio && editForm.servicio.toUpperCase() !== 'DÍA LIBRE' && !editForm.bus">
                    <p>⚠️ Falta especificar el número de autobús.</p>
                </template>
            </div>

            <div class="flex gap-2 mt-5">
                <button @click="ui.showEdit = false" class="flex-1 bg-gray-800 py-3 rounded-lg font-bold text-xs uppercase">Cerrar</button>
                <button @click="guardarCambios()" class="flex-1 bg-orange-600 py-3 rounded-lg font-black text-xs uppercase text-white">Guardar</button>
            </div>
        </div>
    </div>

    <!-- medbasha stamp -->

    <script>
        function bashaApp() {
            return {
                ui: { showImport: false, showEdit: false },
                inputRaw: '',
                planning: [],
                editIndex: null,
                editForm: { diaSemana: '', fecha: '', servicio: '', entrada: '', salida: '', bus: '' },

                init() {
                    const saved = localStorage.getItem('basha_v10_auto');
                    if (saved) {
                        this.planning = JSON.parse(saved);
                    } else {
                        this.crearSemanaVacia(new Date());
                    }
                },

                crearSemanaVacia(baseDate) {
                    const dias = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
                    let date = new Date(baseDate);
                    let day = date.getDay();
                    let diff = date.getDate() - day + (day === 0 ? -6 : 1);
                    let monday = new Date(date.setDate(diff));

                    this.planning = dias.map((d, i) => {
                        let current = new Date(monday);
                        current.setDate(monday.getDate() + i);
                        return {
                            diaSemana: d,
                            fecha: this.formatDate(current),
                            servicio: 'SIN ASIGNAR',
                            entrada: '', salida: '', bus: ''
                        };
                    });
                },

                navegarSemana(dias) {
                    let partes = this.planning[0].fecha.split('/');
                    let fechaActual = new Date(20 + partes[2], partes[1] - 1, partes[0]);
                    fechaActual.setDate(fechaActual.getDate() + dias);
                    this.crearSemanaVacia(fechaActual);
                    this.save();
                },

                formatDate(date) {
                    let d = String(date.getDate()).padStart(2, '0');
                    let m = String(date.getMonth() + 1).padStart(2, '0');
                    let a = String(date.getFullYear()).slice(-2);
                    return `${d}/${m}/${a}`;
                },

                esHoy(fechaStr) {
                    return fechaStr === this.formatDate(new Date());
                },

                getEstiloDia(dia) {
                    const s = dia.servicio?.toUpperCase() || '';
                    if (s.includes('LIBRE') || s.includes('DESCANS')) return 'border-libre';
                    if (s.includes('EXPRES') || s.includes('BINTAUFA')) return 'border-expres';
                    if (s.includes('ESC.') || s.includes('TOMAS') || s.includes('MAÑANA')) return 'border-escolar';
                    return 'border-tarde';
                },

                abrirEditor(index) {
                    this.editIndex = index;
                    this.editForm = { ...this.planning[index] };
                    this.ui.showEdit = true;
                },

                marcarLibreManual() {
                    this.editForm.servicio = 'Día LIBRE';
                    this.editForm.bus = '';
                    this.editForm.entrada = '';
                    this.editForm.salida = '';
                },

                guardarCambios() {
                    if (this.editForm.salida && !this.editForm.entrada) {
                        alert("Supervisor: Has registrado la hora de fin sin haber puesto la de inicio.");
                        return;
                    }
                    if (this.editForm.servicio && this.editForm.servicio.toUpperCase() !== 'DÍA LIBRE' && !this.editForm.bus) {
                        const bNum = prompt("Supervisor: Falta el número de bus. Por favor, introdúcelo de inmediato:");
                        if (bNum && bNum.trim()) {
                            this.editForm.bus = bNum.trim();
                        } else {
                            alert("El número de bus es obligatorio para guardar el turno.");
                            return;
                        }
                    }

                    if (this.planning[this.editIndex].fecha !== this.editForm.fecha) {
                        this.propagarFecha(this.editForm.fecha, this.editIndex);
                    }
                    this.planning[this.editIndex] = { ...this.editForm };
                    this.save();
                    this.ui.showEdit = false;
                },

                propagarFecha(fechaManual, index) {
                    let parts = fechaManual.split(/[\/\-\.]/);
                    if (parts.length < 3) return;
                    let d = parseInt(parts[0]), m = parseInt(parts[1])-1, y = parseInt(parts[2]);
                    if (y < 100) y += 2000;
                    let base = new Date(y, m, d);
                    
                    this.planning.forEach((dia, i) => {
                        let diff = i - index;
                        let nueva = new Date(base);
                        nueva.setDate(base.getDate() + diff);
                        this.planning[i].fecha = this.formatDate(nueva);
                    });
                },

                procesarCuadranteInteligente(texto) {
                    if (!texto.trim()) return;
                    
                    const mapeoDias = {
                        "LUNES": 0, "LUN": 0, "MARTES": 1, "MAR": 1, "MIÉRCOLES": 2, "MIE": 2, "MIER": 2,
                        "JUEVES": 3, "JUE": 3, "VIERNES": 4, "VIE": 4, "SÁBADO": 5, "SAB": 5, "DOMINGO": 6, "DOM": 6
                    };

                    const regexFecha = /\b\d{1,2}[\/\-\.]\d{1,2}([\/\-\.]\d{2,4})?\b/;
                    
                    const primerMatchFecha = texto.match(/\b\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}\b/);
                    if (primerMatchFecha) {
                        let p = primerMatchFecha[0].split(/[\/\-\.]/);
                        let y = parseInt(p[2]); if (y < 100) y += 2000;
                        this.crearSemanaVacia(new Date(y, parseInt(p[1])-1, parseInt(p[0])));
                    }

                    const lineas = texto.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                    
                    lineas.forEach(linea => {
                        const lU = linea.toUpperCase();
                        let indexDiaEncontrado = -1;

                        for (let clave in mapeoDias) {
                            if (lU.startsWith(clave) || lU.includes(" " + clave) || lU.includes("\t" + clave)) {
                                indexDiaEncontrado = mapeoDias[clave];
                                break;
                            }
                        }

                        if (indexDiaEncontrado !== -1) {
                            let itemDia = this.planning[indexDiaEncontrado];

                            const horas = linea.match(/\b\d{2}:\d{2}\b/g);
                            if (horas && horas.length >= 2) {
                                itemDia.entrada = horas[0];
                                itemDia.salida = horas[1];
                            } else if (horas && horas.length === 1) {
                                itemDia.entrada = horas[0];
                            }

                            let busMatch = linea.match(/BUS\s*:?\s*\b(\d{2,3})\b/i);
                            if (!busMatch) {
                                const posiblesNumeros = linea.match(/(?<![:\d])\b(56|67|76|86|10|15|20|101|102)\b(?![%:\d])/g);
                                if (posiblesNumeros) {
                                    itemDia.bus = posiblesNumeros[posiblesNumeros.length - 1];
                                }
                            } else {
                                itemDia.bus = busMatch[1];
                            }

                            if (lU.includes('LIBRE') || lU.includes('DESCANS')) {
                                itemDia.servicio = "Día LIBRE";
                                itemDia.bus = '';
                                itemDia.entrada = '';
                                itemDia.salida = '';
                            } else {
                                let textoLimpio = linea
                                    .replace(regexFecha, '')
                                    .replace(/\b\d{2}:\d{2}\b/g, '')
                                    .replace(/BUS\s*:?\s*\d{2,3}/i, '')
                                    .replace(/(LUNES|MARTES|MIÉRCOLES|JUEVES|VIERNES|SÁBADO|DOMINGO|LUN|MAR|MIE|MIER|JUE|VIE|SAB|DOM)/i, '')
                                    .replace(/[:,\-–—]/g, ' ')
                                    .replace(/\s+/g, ' ')
                                    .trim();

                                if (textoLimpio.length > 2) {
                                    itemDia.servicio = textoLimpio;
                                } else {
                                    itemDia.servicio = "TURNO ASIGNADO";
                                }
                            }
                        }
                    });

                    this.save();
                    this.ui.showImport = false;
                    this.inputRaw = '';
                },

                // Lógica de cálculo corregida para medianoche y límites de tarde
                calcularDietas(dia) {
                    if (!dia.entrada || !dia.salida || dia.servicio === 'Día LIBRE') return { comida: false, cena: false };
                    
                    const [hEnt, mEnt] = dia.entrada.split(':').map(Number);
                    const [hSal, mSal] = dia.salida.split(':').map(Number);
                    
                    const entradaEnMinutos = hEnt * 60 + mEnt;
                    let salidaEnMinutos = hSal * 60 + mSal;
                    
                    // Si la hora de salida es menor que la de entrada, el turno ha cruzado la medianoche (ej: 00:30)
                    if (salidaEnMinutos < entradaEnMinutos) {
                        salidaEnMinutos += 24 * 60;
                    }

                    const totalHoras = (salidaEnMinutos - entradaEnMinutos) / 60;

                    let comida = false;
                    let cena = false;

                    const min1500 = 15 * 60;
                    const min1530 = 15 * 60 + 30;
                    const min2300 = 23 * 60;

                    const esSalida1500Punto = (hSal === 15 && mSal === 0);
                    const esSalida1530Punto = (hSal === 15 && mSal === 30);
                    const esSalida2300Punto = (hSal === 23 && mSal === 0);

                    // 1. REGLAS PARA LA COMIDA (Turnos de Mañana)
                    if (hEnt < 13 && hSal <= 17 && hSal >= 15) {
                        if (totalHoras >= 9 && salidaEnMinutos >= min1500) {
                            comida = true;
                        } 
                        else if (totalHoras >= 6 && salidaEnMinutos >= min1530) {
                            comida = true;
                        }
                    }
                    if (hEnt < 13 && (esSalida1500Punto || esSalida1530Punto)) {
                        comida = true;
                    }

                    // 2. REGLAS PARA LA CENA (Turnos de Tarde/Noche)
                    if (hEnt >= 13) {
                        if (salidaEnMinutos >= min2300 || esSalida2300Punto) {
                            cena = true;
                        }
                    }

                    return { comida, cena };
                },

                save() { localStorage.setItem('basha_v10_auto', JSON.stringify(this.planning)); },

                borrarTodo() {
                    if (confirm('¿Resetear cuadrante y fechas?')) {
                        this.crearSemanaVacia(new Date());
                        this.save();
                    }
                }
            }
        }
    </script>
</body>
</html>
